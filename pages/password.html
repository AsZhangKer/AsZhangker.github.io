<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码破译 · Zhangker</title>
    <link rel="icon" type="image/png" href="../imgs/favicon.png">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== 主题变量 ===== */
        /* 暗色主题 (默认) */
        body {
            --bg-color: #0a0c0f;
            --text-primary: #c0dcff;
            --text-secondary: #b0ccee;
            --element-bg: #1b212a;
            --element-bg-hover: #2d3542;
            --border-accent: #1f3540;
            --corner-radius: 16px;
            --success: #2e7d32;
            --warning: #b85e00;
            --danger: #b71c1c;
        }

        /* 亮色主题 */
        body.light-theme {
            --bg-color: #ffffff;
            --text-primary: #4f3f30;
            --text-secondary: #6b5847;
            --element-bg: #f0eae2;
            --element-bg-hover: #e0d6cc;
            --border-accent: #cbb59b;
            --corner-radius: 16px;
            --success: #2e7d32;
            --warning: #b85e00;
            --danger: #b71c1c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s, color 0.2s;
        }

        /* 页面头部 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-accent);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 400;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .page-title i {
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .theme-btn {
            background-color: var(--element-bg);
            color: var(--text-primary);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .theme-btn:hover {
            background-color: var(--element-bg-hover);
        }

        .back-home-btn {
            background-color: var(--element-bg);
            color: var(--text-primary);
            padding: 0.6rem 1.4rem;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            transition: background-color 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .back-home-btn:hover {
            background-color: var(--element-bg-hover);
        }

        /* 主内容区 */
        .game-container {
            flex: 1;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        /* 卡片样式 */
        .card {
            background-color: var(--element-bg);
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-accent);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-accent);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .section-title i {
            color: var(--text-secondary);
        }

        /* 游戏说明区域 */
        .game-intro {
            background-color: var(--bg-color);
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-accent);
        }

        .game-intro h3 {
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.8rem;
        }

        .game-intro p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .game-intro ul {
            margin-left: 1.5rem;
            color: var(--text-secondary);
        }

        .game-intro li {
            margin-bottom: 0.3rem;
        }

        /* 难度按钮组 */
        .difficulty-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            background-color: var(--element-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-accent);
            padding: 0.8rem 2rem;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 400;
        }

        .difficulty-btn:hover {
            background-color: var(--element-bg-hover);
            border-color: var(--text-secondary);
            transform: translateY(-2px);
        }

        /* 游戏区域 */
        .game-area {
            display: none;
            margin-top: 2rem;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 1.5rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stat-box {
            background-color: var(--bg-color);
            padding: 1rem 2rem;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            text-align: center;
            border: 1px solid var(--border-accent);
            min-width: 120px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .input-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2rem 0;
        }

        .input-section input {
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 2px solid var(--border-accent);
            padding: 0.8rem 1rem;
            font-size: 1.5rem;
            text-align: center;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            margin-bottom: 1rem;
            width: 200px;
            font-family: monospace;
        }

        .input-section input:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .submit-btn {
            background-color: var(--element-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-accent);
            padding: 0.8rem 3rem;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--element-bg-hover);
            border-color: var(--text-secondary);
        }

        /* 反馈区域 */
        .feedback-container {
            margin: 1.5rem 0;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .feedback-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.2rem;
            background-color: var(--bg-color);
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border-accent);
        }

        .feedback-guess {
            font-weight: 500;
            font-family: monospace;
            font-size: 1.2rem;
        }

        .feedback-icons {
            display: flex;
            gap: 0.3rem;
        }

        .feedback-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.9rem;
            background-color: var(--element-bg);
        }

        .icon-correct {
            background-color: #2e7d32;
            color: white;
        }

        .icon-present {
            background-color: #b85e00;
            color: white;
        }

        .icon-absent {
            background-color: #b71c1c;
            color: white;
        }

        .game-result {
            text-align: center;
            padding: 1.5rem;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            margin: 1.5rem 0;
            display: none;
            font-size: 1.2rem;
            border: 1px solid;
        }

        .result-success {
            background-color: #1b2e1b;
            color: #81c784;
            border-color: #2e7d32;
        }

        .result-failure {
            background-color: #2e1b1b;
            color: #ef9a9a;
            border-color: #b71c1c;
        }

        .restart-btn {
            background-color: var(--element-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-accent);
            padding: 0.8rem 3rem;
            border-radius: var(--corner-radius) 0 var(--corner-radius) 0;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            margin: 0 auto;
        }

        .restart-btn:hover {
            background-color: var(--element-bg-hover);
            border-color: var(--text-secondary);
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .page-title {
                font-size: 1.6rem;
            }
            .card {
                padding: 1.5rem;
            }
            .difficulty-btn {
                padding: 0.6rem 1.5rem;
            }
            .header-actions {
                gap: 0.5rem;
            }
            .theme-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .back-home-btn {
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 页面头部：标题 + 主题切换 + 返回首页 -->
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-leaf"></i> 密码破译</h1>
        <div class="header-actions">
            <button id="themeToggle" class="theme-btn" aria-label="切换主题">
                <i class="fas fa-moon"></i>
            </button>
            <a href="../index.html" class="back-home-btn" title="返回首页">
                <i class="fas fa-arrow-left"></i> 首页
            </a>
        </div>
    </div>

    <!-- 游戏主容器 -->
    <div class="game-container">
        <div class="card">
            <h2 class="section-title"><i class="fas fa-info-circle"></i> 游戏说明</h2>
            <div class="game-intro">
                <h3>背景剧情</h3>
                <p>深林中...</p>
                <p>你中了一个陷阱，你现在被密码锁住了。</p>
                <p>还有120秒TNT就要把你炸飞起来，让我们一起帮助破译吧qwq！</p>
                
                <h3>游戏规则</h3>
                <ul>
                    <li>你有120秒时间和12次尝试机会（否则会被炸飞）</li>
                    <li>✅ 表示数字且位置正确</li>
                    <li>🔄 表示数字正确但位置不对</li>
                    <li>❌ 表示数字位置都错</li>
                    <li>密码数字不会重复!</li>
                </ul>
            </div>
            
            <!-- 难度选择 -->
            <div class="difficulty-buttons">
                <button class="difficulty-btn" data-length="4">弱鸡模式: 4位密码</button>
                <button class="difficulty-btn" data-length="5">普通模式: 5位密码</button>
                <button class="difficulty-btn" data-length="6">大佬模式: 6位密码</button>
            </div>
            
            <!-- 游戏主区域（初始隐藏） -->
            <div class="game-area" id="gameArea">
                <div class="game-stats">
                    <div class="stat-box">
                        <div class="stat-value" id="timer">120</div>
                        <div class="stat-label">剩余时间</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="attempts">12</div>
                        <div class="stat-label">剩余尝试</div>
                    </div>
                </div>
                
                <div class="input-section">
                    <input type="text" id="guessInput" placeholder="输入密码" maxlength="6">
                    <button class="submit-btn" id="submitGuess">提交猜测</button>
                </div>
                
                <div class="feedback-container" id="feedbackContainer"></div>
                
                <div class="game-result" id="gameResult"></div>
                <button class="restart-btn" id="restartBtn">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // 检查本地存储主题
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            body.classList.add('light-theme');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            body.classList.remove('light-theme');
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-theme');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                localStorage.setItem('theme', 'light');
            }
        });

        // 游戏逻辑
        let password = [];
        let attemptsLeft = 12;
        let timeLeft = 120;
        let gameActive = false;
        let timerInterval;
        let passwordLength = 4;

        const gameArea = document.getElementById('gameArea');
        const timerDisplay = document.getElementById('timer');
        const attemptsDisplay = document.getElementById('attempts');
        const guessInput = document.getElementById('guessInput');
        const submitBtn = document.getElementById('submitGuess');
        const feedbackContainer = document.getElementById('feedbackContainer');
        const gameResult = document.getElementById('gameResult');
        const restartBtn = document.getElementById('restartBtn');
        const difficultyButtons = document.querySelectorAll('.difficulty-btn');

        // 生成随机密码（数字不重复）
        function generatePassword(length) {
            const digits = [];
            while (digits.length < length) {
                const digit = Math.floor(Math.random() * 10).toString();
                if (!digits.includes(digit)) {
                    digits.push(digit);
                }
            }
            return digits;
        }

        // 初始化游戏
        function initGame(length) {
            passwordLength = length;
            password = generatePassword(passwordLength);
            attemptsLeft = 12;
            timeLeft = 120;
            gameActive = true;
            
            gameArea.style.display = 'block';
            guessInput.setAttribute('maxlength', length);
            guessInput.placeholder = `输入${length}位数字`;
            guessInput.value = '';
            attemptsDisplay.textContent = attemptsLeft;
            timerDisplay.textContent = timeLeft;
            feedbackContainer.innerHTML = '';
            gameResult.style.display = 'none';
            gameResult.textContent = '';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (!gameActive) return;
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                endGame(false);
            }
        }

        // 检查猜测
        function checkGuess(guess) {
            const guessArray = guess.split('');
            const result = [];
            const passwordCopy = [...password];
            
            // 第一轮：正确位置
            for (let i = 0; i < guessArray.length; i++) {
                if (guessArray[i] === password[i]) {
                    result[i] = 'correct';
                    passwordCopy[i] = null;
                }
            }
            // 第二轮：数字正确位置错误
            for (let i = 0; i < guessArray.length; i++) {
                if (result[i] !== 'correct') {
                    const indexInPassword = passwordCopy.indexOf(guessArray[i]);
                    if (indexInPassword !== -1) {
                        result[i] = 'present';
                        passwordCopy[indexInPassword] = null;
                    } else {
                        result[i] = 'absent';
                    }
                }
            }
            return result;
        }

        function displayFeedback(guess, result) {
            const feedbackItem = document.createElement('div');
            feedbackItem.className = 'feedback-item';
            
            const guessSpan = document.createElement('span');
            guessSpan.className = 'feedback-guess';
            guessSpan.textContent = guess;
            feedbackItem.appendChild(guessSpan);
            
            const iconsSpan = document.createElement('span');
            iconsSpan.className = 'feedback-icons';
            
            result.forEach(status => {
                const icon = document.createElement('span');
                icon.className = `feedback-icon icon-${status}`;
                icon.textContent = status === 'correct' ? '✅' : (status === 'present' ? '🔄' : '❌');
                iconsSpan.appendChild(icon);
            });
            
            feedbackItem.appendChild(iconsSpan);
            feedbackContainer.insertBefore(feedbackItem, feedbackContainer.firstChild);
        }

        function endGame(isWin) {
            gameActive = false;
            clearInterval(timerInterval);
            
            if (isWin) {
                gameResult.textContent = `🎉 恭喜你！密码是：${password.join('')}`;
                gameResult.className = 'game-result result-success';
            } else {
                gameResult.textContent = `💥 很遗憾，密码是：${password.join('')}`;
                gameResult.className = 'game-result result-failure';
            }
            gameResult.style.display = 'block';
        }

        // 事件绑定
        difficultyButtons.forEach(button => {
            button.addEventListener('click', () => {
                const length = parseInt(button.dataset.length);
                initGame(length);
            });
        });

        submitBtn.addEventListener('click', () => {
            if (!gameActive) return;
            
            const guess = guessInput.value.trim();
            
            if (guess.length !== passwordLength) {
                alert(`请输入${passwordLength}位数字！`);
                return;
            }
            if (!/^\d+$/.test(guess)) {
                alert('请输入有效的数字！');
                return;
            }
            const uniqueDigits = new Set(guess.split(''));
            if (uniqueDigits.size !== passwordLength) {
                alert('数字不能重复！');
                return;
            }
            
            attemptsLeft--;
            attemptsDisplay.textContent = attemptsLeft;
            
            const result = checkGuess(guess);
            displayFeedback(guess, result);
            
            if (result.every(status => status === 'correct')) {
                endGame(true);
            } else if (attemptsLeft <= 0) {
                endGame(false);
            }
            
            guessInput.value = '';
        });

        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && gameActive) {
                submitBtn.click();
            }
        });

        restartBtn.addEventListener('click', () => {
            gameArea.style.display = 'none';
        });
    </script>
</body>
</html>
